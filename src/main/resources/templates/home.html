<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Curso - EduManager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; }
        .card { max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card bg-white">
        <h2 class="text-center mb-4">Crear Nuevo Curso</h2>
        <form th:action="@{/admin/cursos/guardar}" th:object="${curso}" method="post">
            
            <div class="mb-3">
                <label class="form-label">Identificador de Sección (Canal):</label>
                <input type="text" th:field="*{canal}" class="form-control" placeholder="Ej: EA-AD-1" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Código SENCE:</label>
                <input type="text" th:field="*{codigo}" class="form-control" placeholder="Ej: 123456" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Nombre del Curso:</label>
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Full Stack Java" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Total de Horas:</label>
                <input type="number" th:field="*{duracionHoras}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Área (Categoría):</label>
                <input type="text" th:field="*{categoria}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Estado:</label>
                <select th:field="*{activo}" class="form-select">
                    <option th:value="true">Activo</option>
                    <option th:value="false">Inactivo</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Guardar Curso</button>
        </form>
        <div class="text-center mt-3">
            <a th:href="@{/admin/cursos}" class="text-decoration-none">← Ver lista de cursos</a>
        </div>
    </div>
</body>
</html>
