<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Cursos - EduManager</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        
        .navbar { 
            background: var(--primary); 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            color: white; 
            align-items: center;
        }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .navbar a:hover { color: var(--accent); }
        
        .container { padding: 40px; max-width: 1000px; margin: auto; }
        
        .btn-add { 
            display: inline-block; 
            background: var(--accent); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 5px; 
            text-decoration: none; 
            font-weight: bold; 
            margin-bottom: 20px; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        th { background: var(--primary); color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        tr:nth-child(even) { background: #f9f9f9; }
        
        .status { font-weight: bold; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; }
        .active { color: #27ae60; }
        .inactive { color: #95a5a6; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div style="font-weight: bold;">🎓 SpringEduManager</div>
        <div>
            <a th:href="@{/}">Inicio</a>
            <a th:href="@{/admin/estudiantes}">Estudiantes</a>
            <a th:href="@{/admin/cursos}">Cursos</a>
        </div>
    </nav>

    <div class="container">
        <h1>Gestión de Cursos</h1>
        <a th:href="@{/admin/cursos/nuevo}" class="btn-add">+ Registrar Nuevo Curso</a>
        
        <table>
            <thead>
                <tr>
                    <th>Canal</th>
                    <th>Código SENCE</th>
                    <th>Nombre del Curso</th>
                    <th>Horas</th>
                    <th>Área</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${listaCursos}">
                    <td th:text="${c.canal}"></td>
                    <td th:text="${c.codigo}"></td>
                    <td th:text="${c.nombre}" style="font-weight: bold;"></td>
                    <td th:text="${c.duracionHoras} + ' hrs'"></td>
                    <td th:text="${c.categoria}"></td>
                    <td>
                        <span th:class="${c.activo} ? 'status active' : 'status inactive'"
                              th:text="${c.activo ? 'Activo' : 'Inactivo'}">
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
