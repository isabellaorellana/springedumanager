<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SpringEduManager - Gestión de Curso</title>
    <style>
        :root {
            --primary-color: #2c3e50; 
            --accent-color: #3498db; 
            --accent-hover: #2980b9;
            --bg-color: #f4f7f6;
            --input-border: #ddd;
            --input-focus-border: #aed6f1; 
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh; 
        }

        .form-container {
            max-width: 500px;
            width: 100%;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            box-sizing: border-box;
        }

        h1 {
            color: var(--primary-color);
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            margin: 0 0 30px 0;
            font-weight: 600;
            text-align: center;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
        }

        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box; 
        }

        input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 5px var(--input-focus-border);
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--accent-hover);
        }

        .btn-cancel {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-cancel:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 th:text="${curso.id != null ? 'Editar Curso' : 'Registrar Nuevo Curso'}">Nuevo Curso</h1>

        <form th:action="@{/admin/cursos/guardar}" th:object="${curso}" method="post">
            
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
                <label>Nombre del Curso:</label>
                <input type="text" th:field="*{nombre}" required placeholder="Ej. Java Full Stack" />
            </div>

            <div class="form-group">
                <label>Código SENCE:</label>
                <input type="text" th:field="*{codigo}" required placeholder="Ej. 12345678" />
            </div>

            <div class="form-group">
                <label>Canal:</label>
                <input type="text" th:field="*{canal}" required placeholder="Ej. Presencial / Online" />
            </div>

            <div class="form-group">
                <label>Horas de duración:</label>
                <input type="number" th:field="*{duracionHoras}" required placeholder="Ej. 400" />
            </div>

            <div class="form-group">
                <label>Área / Categoría:</label>
                <input type="text" th:field="*{categoria}" required placeholder="Ej. Tecnología" />
            </div>

            <button type="submit" class="btn-submit">Guardar Curso</button>
        </form>

        <a th:href="@{/admin/cursos}" class="btn-cancel">Cancelar y volver</a>
    </div>
</body>
</html>
