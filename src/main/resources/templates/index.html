<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Administración - EduManager</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 80%; max-width: 600px; }
        h1 { color: var(--primary); margin-bottom: 30px; border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .menu-item { background: var(--accent); color: white; padding: 25px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 1.1rem; }
        .menu-item:hover { background: #2980b9; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); }
        .logout-btn { margin-top: 30px; display: inline-block; color: #e74c3c; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>EduManager: Gestión OTEC</h1>
        <div class="menu-grid">
            <a th:href="@{/admin/cursos}" class="menu-item">Ver Lista de Cursos</a>
            <a th:href="@{/admin/cursos/nuevo}" class="menu-item">Registrar Nuevo Curso</a>
            
            <a th:href="@{/admin/estudiantes}" class="menu-item">Ver Lista de Estudiantes</a>
            <a th:href="@{/admin/estudiantes/nuevo}" class="menu-item">Inscribir Estudiante</a>
        </div>
        
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-btn" style="border:none; background:none; cursor:pointer;">Cerrar Sesión</button>
        </form>
    </div>
</body>
</html>
